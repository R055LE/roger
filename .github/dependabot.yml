version: 2
updates:
  # Keep the SHA-pinned CI actions current (Dependabot bumps both the SHA and the comment).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Track the pinned Python deps in pyproject.toml.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
