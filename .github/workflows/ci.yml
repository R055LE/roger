name: ci

# The gate: lint + tests on every PR and every push to main. Nothing ships that isn't green.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install (with dev deps)
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check .
      - name: Test
        # Coverage gate is a regression guard, not a purity bar — the testable core sits well above
        # it; bot.py's Discord I/O glue is integration-test territory that drags the total down.
        run: pytest --cov=roger --cov-report=term-missing --cov-fail-under=75
      - name: Audit dependencies (pip-audit)
        # Fails the build on a known CVE in the pinned deps. --skip-editable ignores the local
        # `roger` install (no PyPI version to resolve).
        run: |
          pip install pip-audit==2.10.1
          pip-audit --skip-editable
