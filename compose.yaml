services:
  roger:
    # Published by the release workflow on every push to main. The deploy host pulls this tag.
    # For local builds from source, add: -f compose.yaml -f compose.dev.yaml (see compose.dev.yaml).
    image: ghcr.io/r055le/roger:main
    init: true
    read_only: true
    restart: unless-stopped
    tmpfs:
      - /tmp
    volumes:
      - ./data:/data
    environment:
      # Secrets are injected from the process env by `sops exec-env` — never hard-coded here.
      DISCORD_TOKEN: ${DISCORD_TOKEN:?set via sops exec-env}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?set via sops exec-env}
      OWNER_ID: ${OWNER_ID:?}
      GUILD_ID: ${GUILD_ID:?}
      # Non-secret config: safe defaults, overridable from roger.env.
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      MODEL_ADMIN: ${MODEL_ADMIN:-}
      MODEL_AMBIENT: ${MODEL_AMBIENT:-}
      MODEL_DIGEST: ${MODEL_DIGEST:-}
      DAILY_TOKENS_ADMIN: ${DAILY_TOKENS_ADMIN:-50000}
      DAILY_TOKENS_AMBIENT: ${DAILY_TOKENS_AMBIENT:-30000}
      DAILY_TOKENS_DIGEST: ${DAILY_TOKENS_DIGEST:-20000}
      AMBIENT_RATE_PER_USER: ${AMBIENT_RATE_PER_USER:-5}
      AMBIENT_RATE_WINDOW_S: ${AMBIENT_RATE_WINDOW_S:-600}
      AMBIENT_GLOBAL_HOURLY: ${AMBIENT_GLOBAL_HOURLY:-30}
      DIGEST_FEEDS: ${DIGEST_FEEDS:-}
      DIGEST_CHANNEL_ID: ${DIGEST_CHANNEL_ID:-}
      DIGEST_HOUR: ${DIGEST_HOUR:-8}
      TZ: ${TZ:-America/Detroit}
      DB_PATH: ${DB_PATH:-/data/roger.db}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
